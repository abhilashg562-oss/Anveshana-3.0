<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ground Truth - Bin Details</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <div class="details-container">
    <header class="details-header">
      <h1><i class="fa-solid fa-trash-can"></i> <span id="dustbin-id">Bin bin-001</span></h1>
      <p>VBCA Network · Mysuru, Karnataka, India — Real-time fill level monitoring.</p>
      <nav class="header-nav">
        <a href="index.html" class="nav-link active"><i class="fa-solid fa-home"></i> Home</a>
        <a href="truck.html" class="nav-link"><i class="fa-solid fa-truck"></i> Truck Dashboard</a>
      </nav>
    </header>

    <main class="details-main">
      <div class="fill-level-card">
        <h2><i class="fa-solid fa-fill-drip"></i> Current Fill Level</h2>
        <p>Status: <span id="dustbin-status">Loading...</span></p>
        <div class="fill-percentage">
<span id="fill-level-value">--</span> kg
        </div>
        <p class="fill-level-text">Loading...</p>
        <div class="progress-bar">
          <div id="progress-bar-inner" class="progress-bar-inner" style="width: 0%;"></div>
        </div>
        <p class="update-info">Updates automatically every 6 seconds from Firebase.</p>
      </div>
    </main>

    <footer>
      <a href="index.html" class="btn btn-back"><i class="fa-solid fa-arrow-left"></i> Back to Map View</a>
      <p class="footer-text">SmartBin Project © 2025</p>
    </footer>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <!-- App Script -->
  <script src="js/script.js"></script>
</body>
</html>
